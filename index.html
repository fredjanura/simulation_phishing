<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Authentification ENT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #005ea5;
            color: white;
            border: none;
            cursor: pointer;
        }
        .warning {
            margin-top: 15px;
            color: red;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Connexion ENT</h2>
    <input type="text" placeholder="Identifiant">
    <input type="password" placeholder="Mot de passe">
    <button onclick="simulate()">Se connecter</button>

    <div class="warning" id="warning">
        ⚠️ Ceci était une simulation de phishing pédagogique.<br><br>
        Ne saisissez jamais vos identifiants après avoir cliqué sur un lien dans un email.
    </div>
</div>

<script>
function simulate() {
    document.getElementById("warning").style.display = "block";
}
</script>

</body>
</html>
